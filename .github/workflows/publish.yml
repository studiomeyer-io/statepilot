name: Publish to PyPI

# Publishes on a version tag (e.g. v0.1.0) using PyPI Trusted Publishing (OIDC).
# No API tokens are stored: the PyPI project must have this repo + workflow
# configured as a trusted publisher first.
# See: https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/statepilot/
    permissions:
      id-token: write # REQUIRED for trusted publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
