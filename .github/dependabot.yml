version: 2
# Conservative policy: weekly grouped patch+minor updates, semver-major
# ignored (we bump majors deliberately), monthly grouped CI-action bumps.
# Note: the core has zero runtime dependencies — pip updates here only touch
# the optional `yaml` extra and the dev toolchain (pytest/mypy/ruff).
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
    groups:
      actions:
        patterns:
          - "*"
